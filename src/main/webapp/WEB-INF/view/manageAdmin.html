<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Admin</title>
</head>
<body>

<div id="main-content">
    <h1>Manage Admins</h1>

  

    <div class="btn-add-admin">
        <button id="add_btn_user"> Add Admin</button>

    </div>

    <div class="admin-table-container">
        <table id="admin_table_view">
            <thead>
            <tr>
                <th>S.No</th>
                <th>UserName</th>
                <th>Password</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>


            </tbody>
        </table>
    </div>
</div>

<div id="addAdminModal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <form id="addAdminForm" method="POST" enctype="multipart/form-data">
            <label for="userName" >User Name</label>
            <input type="text" id="userName" name="userName" required placeholder="Enter username"/>

            <label for="password" >Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required />

            <label for="image">Image</label>
            <input type="file" id="image" name="image" accept="image/*" required />

            <input type="submit" id="submit_btn" value="Add Admin" />
        </form>
    </div>
</div>


</body>
</html>
