<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions</title>

</head>
<body>

<p class="sessionInfo">In this section you can manage sessions.To ensure data integrity, the Session ID will
  be managed automatically. Please select a row in the table to perform Enter, Update, Delete operations on sessions.
</p>

<div class="form-container">
  <div class="session-table-container">

    <table id="session_table_view">
      <thead id="tableHead">
      <tr>
        <th data-column="id" data-order="desc">Session ID </th>
        <th data-column="name" data-order="desc">Session Name </th>
      </tr>
      </thead>
      <tbody>

      <!-- Dynamic rows will be added here -->

      </tbody>
    </table>
  </div>

  <form id="session_form" method="POST">
    <div class="input-group">
      <label for="add session title">Session Title</label>
      <input type="text" id="sessionName" name="sessionName" placeholder="e.g 2022-2026"
              maxlength="9"
             required>

    </div>
    <div class="input-group">
      <input type="text" hidden id="sessionID">
    </div>

    <div class="button-group">
      <button type="submit" id="session_delete_button" class="delete_btn" >Delete</button>
      <button type="reset" id="session_clear_button" class="clear_btn" >Clear</button>

      <button type="submit" id="add_session_button" class="add_btn" >Add</button>
      <button type="submit" id="session_update_button" class="update_btn" >Update</button>
    </div>
  </form>

</div>
</div>


</body>
</html>
